include: package:flutter_lints/flutter.yaml
# Ignora los withOpacity de los colores.
analyzer:
  errors:
    deprecated_member_use: ignore
    # Ignora los nombres de variables que no son constantes. Por ejemplo, installation_height.
    non_constant_identifier_names: ignore
    # Ignora el uso de build_context_synchronously.
    use_build_context_synchronously: ignore

linter:
  rules:
    # Exige usar const al instanciar widgets estáticos (ej. const Text('Hola')).
    # Esto mejora el rendimiento de la aplicación.
    prefer_const_constructors: true

    # Exige usar const en listas y mapas literales (ej. children: const []).
    prefer_const_literals_to_create_immutables: true

    # Exige definir como const el constructor de tus propias clases.
    prefer_const_constructors_in_immutables: true