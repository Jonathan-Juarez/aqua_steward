name: aqua_steward
description: "Un sistema diseñado para el monitoreo del nivel y calidad del agua en tiempo real mediante tecnología IoT, promoviendo una gestión eficiente y responsable del recurso hídrico."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  animate_do: ^4.2.0
  firebase_messaging: ^16.2.0 # Notificaciones push de Firebase.
  fl_chart: ^1.1.1
  http: ^1.6.0 # HTTP para hacer peticiones.
  intl: ^0.20.2 # Formato de fechas.
  mobile_scanner: ^7.2.0 # Escanear QR.
  socket_io_client: ^3.1.4 # Socket para conectar en tiempo real con el socket.
  shared_preferences: ^2.5.4 # Persistencia de preferencias del usuario.
  screenshot: ^3.0.0 # Captura de pantalla para colocar el gráfico en el PDF.
  package_info_plus: ^9.0.1 # Obtener información del paquete.
  printing: ^5.14.2 # Visualizar, gestionar PDF.
  permission_handler: ^12.0.1 # Manejo de permisos.
  pdf: ^3.11.3 # Generar PDF.
  provider: ^6.1.5+1 # Manejo de estados.
  url_launcher: ^6.3.2 # Abrir enlaces externos (Email, WA, etc).
  flutter_localizations: # Soporte para idiomas.
    sdk: flutter



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  # Habilita la autogeneración de código para internacionalización (i18n).
  generate: true
  assets:
    - assets/data/water_level.json
    - assets/data/water_turbidity.json
    - assets/data/water_ph.json
    - assets/images/gota.png
    - assets/images/logo_AquaSteward.png
    - assets/images/logo_transparente_AquaSteward.png
    - assets/images/logo.png
    - assets/images/deposit.png
    - assets/images/branding.png
    - assets/images/branding_dark.png

# Ejecutar dart run flutter_launcher_icons para configurar el ícono de la app
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_AquaSteward.png"

# Ejecutar dart run flutter_native_splash:create para configurar el splash screen de la app
flutter_native_splash:
  android: true
  ios: true
  web: false
  color: "#FFFFFF"
  color_dark: "#010915"
  image: assets/images/logo_transparente_AquaSteward.png
  branding: assets/images/branding.png
  branding_dark: assets/images/branding_dark.png
  android_12:
    color: "#FFFFFF"
    color_dark: "#010915"
    image: assets/images/logo_transparente_AquaSteward.png
    branding: assets/images/branding.png
    branding_dark: assets/images/branding_dark.png